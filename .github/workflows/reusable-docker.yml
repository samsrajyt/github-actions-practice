name: Build and Push
on:
  workflow_call:

    inputs:
       image_name:
         desc: holds image name
         type: string
         default: "ai-bank-app"

       tag:
         desc: holds the tag of the image built
         type: string
         defualt: 'latest'
  
    outputs:
      image_url:
        ${{ jobs.reusable-build-and-push.outputs.image_url }}
     


jobs:
  reusable-build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_url:
          ${{ steps.image_id.outputs.image_url }}


    steps:
      - name: Checkout Code
        uses: actions/checkout@v6


      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: build image
        uses: docker/build-push-action@v7
        with:
          context: ./AI-BankApp-DevOps
          file: ./AI-BankApp-DevOps/Dockerfile.multistage
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:${{ inputs.tag }}

      - name: image url
        id: image_id
        run: |
          image_url=${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:${{ inputs.tag }}
          echo "$image_url" >> $GITHUB_OUTPUT


