name: Job Output
on:
  push:
    branches: [main]

jobs:
  date-string:
    runs-on: ubuntu-latest
    # 1. Define the job-level output and map it to a specific step
    outputs:
      date: ${{ steps.get_date.outputs.date }}
    
    steps:
      - name: Get the current date
        # 2. Add an ID to this step so we can reference it
        id: get_date 
        # 3. Use the run command to write to $GITHUB_OUTPUT
        run: |
          echo "date=$(date)" >> "$GITHUB_OUTPUT"

  print-date:
    runs-on: ubuntu-latest
    needs: date-string
    steps:
      - name: Print the date
        env:
          # 4. Reference the output from the needed job
          OUTPUT_DATE: ${{ needs.date-string.outputs.date }}
        run: |
          echo "$OUTPUT_DATE"
