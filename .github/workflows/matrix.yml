name: Matrix Workflow

on:
  push:
    branches: [main]



jobs:
  python_version_check:
    strategy:
      matrix:
        versions: ['3.10','3.11','3.12']
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: install python version
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.versions }}
      - run: python --version



