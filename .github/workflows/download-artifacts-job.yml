name: Download Artifacts Between Jobs
on:
  workflow_dispatch


jobs:
  generate-file:
    runs-on: ubuntu-latest
    steps:
      - name: Create file
        run: |
          echo "This is a file generated by Job generate-file" >> ./file-generated.txt


      - name: Upload file
        uses: actions/upload-artifact@v6
        with:
          name: job1-artifact
          path: ./file-generated.txt



  download-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: job1-artifact

        run: |
          echo "Contents of Job1 Artifact"
          cat file-generated.txt



