
on:
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      app_name: "my-web-app"
      environment: "production"
    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  print-build-version:
    needs: build
    steps:
      echo "Build Version: ${{ needs.jobs.build.outputs.build_version }}"

    
