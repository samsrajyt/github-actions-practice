on:
  push:
    branches: [main]



jobs:
  docker-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6


      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: short sha
        id: sasha
        run: |
          echo "short_sha=$(echo ${{ github.ref}} | cut -c1-7 )" >> $GITHUB_OUTPUT


      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ./AI-BankApp-DevOps 
          file: ./AI-BankApp-DevOps/Dockerfile.multistage
          push: true
          tags: | 
            ${{ github.repository }}:latest
            ${{ github.repository }}:sha-${{ steps.sasha.outputs.short_sha }}

