name: Matrix Workflow

on:
  push:
    branches: [main]



jobs:
  python_version_check:
    strategy:
      matrix:
        versions: ['3.10','3.11','3.12']
    runs-on: ubuntu-latest

    steps:
      - name: install python version
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.versions }}
      - run: python --version



