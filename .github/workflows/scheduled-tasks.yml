name: Scheduled Workflows
on:
  workflow_dispatch:

  schedule:
    - cron: '30 2 * * 1'
    - cron: '0 */6 * * *'



jobs:
  event-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Print which Schedule Triggered
        run: |
          echo "Schedule Triggered : ${{ github.event.schedule }}"

      - name: Health Check
        run: |
          response_code=$(curl -s -o /dev/null -w "%{http_code}" https://github.com/samsrajyt/90DaysOfDevOps)
          echo "Response Code: $response_code"

