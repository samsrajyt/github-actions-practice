on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]



jobs:
  code-checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Workflow succeeded Check
        run: | 
          if [ "${{ github.event.workflow_run.conclusion}}" == 'success'  ]; then
            echo "Workflow Succedded"
          else
            echo ":warning:: Failed"
            exit 1
          fi

      - name: Checkout Code
        uses: actions/checkout@v6

      
