name: github-runners

on:
  workflow_dispatch:



jobs:
  ubuntu_runner:
    runs-on: ubuntu-latest
    steps:
      - name: print OS
        run: |
          echo "Runner OS is $RUNNER_OS"
          echo "Hostname: $(hostname)"
          echo "Current User: $USER"



  windows_runner:
    runs-on: windows-latest
    steps:
      - name: print OS
        run: |
            echo "Runner OS is ${{ runner.os }}"
            echo "Hostname";hostname
            echo "Current User";whoami


  macos_runner:
    runs-on: macos-latest
    steps: 
    - name: print OS
      run: |
            echo "RUNNER OS is $RUNNER_OS"
            echo "Hostname";hostname
            echo "Current User";whoami
