name: Conditionals Workflow

on:
  push:
    branches: [main]



jobs:
  conditionals:
    runs-on: ubuntu-latest
    steps:
      - name: main branch condition
        if: ${{ github.ref_name == 'main' }}
        run: echo "This is steps only runs when there is push on main branch"


      - name: run on failure
        if: ${{ failure() }}
        run: echo "This step is executed since the previous step failed"


      - name: continue with error
        if: ${{ continue-on-error: true }}
        run: echo "This steps is invoked even after error occurs"
