name: PR-Check
on:
  pull_request:
    branches: [main]


jobs:
  file-size-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: file check 
        run: |
          LARGE_FILES=$(find . -type f -size +1M)
          if [ -n "$LARGE_FILE" ] 
            then 
              echo "File is greater than 1 MB , please check"
              echo "$LARGE_FILES"
              exit 1
             else
               echo " File check Passed"
          fi 
            

  branch-name-check:
    runs-on: ubuntu-latest
    steps:
      - name: branch name check
        run: |
          branch_name=${{ github.head_ref }}
          case "$branch_name" in
            feature/*|fix/*|docs/*)
              echo "$branch_name is Valid"
              ;;
            *)
              echo "Invalid branch name"
              exit 1
              ;;

          esac

          
  pr-body-check:
    runs-on: ubuntu-latest
    steps:
      - name: pr body check
        run: |

          pr_body=${{ github.event.pull_request.body }}
          if [ -z $pr_body ]; then
            echo "::Warning :: Description is empty .....Please add context!"
          else
            echo "PR Description looks good"
          fi
  
